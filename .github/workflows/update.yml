name: FC Online Data Pipeline

on:
  schedule:
    - cron: '0 * * * *' # 매 1시간마다 자동 실행
  workflow_dispatch:     # 수동 실행 버튼 제공

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm install @supabase/supabase-js ws

      - name: 파이프라인 실행
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node fetch_and_store.js
