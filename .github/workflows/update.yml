name: Update FC Online Data Cache

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국시간 오전 9시(UTC 00:00) 자동 실행
  workflow_dispatch: # 수동 실행 버튼

# [추가된 부분] 저장소 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch Nexon API & Generate Cache
        run: node build-data.js

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update match cache data" && git push)
