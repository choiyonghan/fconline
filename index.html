<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FC 온라인 전적 분석</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>⚽ FC 온라인 전적실</h1>
      <div id="status" class="status-text">유저 목록 로딩 중...</div>
    </header>

    <!-- 유저 선택 버튼 목록 -->
    <div id="nicknameButtons" class="nickname-bar"></div>

    <!-- 날짜 필터 -->
    <div class="filter-card">
      <div class="date-inputs">
        <input type="date" id="startDate">
        <span>~</span>
        <input type="date" id="endDate">
      </div>
      <div class="filter-actions">
        <button id="btnSearchDate" class="btn-primary">조회</button>
        <button id="btnResetDate" class="btn-secondary">초기화</button>
      </div>
    </div>

    <!-- 요약 정보 -->
    <div id="summaryInfo" class="summary-info" style="display:none;">
      <div id="dateRange"></div>
    </div>

    <!-- 종합 통계 카드 -->
    <div id="overallStatsContainer"></div>

    <!-- 상대 카드 목록 -->
    <div id="opponentList" class="opponent-list"></div>

    <!-- 상세 보기 카드 (아코디언 연동) -->
    <div id="detailCard" class="detail-card" style="display:none;">
      <div class="detail-header">
        <div id="detailTitle" class="detail-title">상대 전적 상세</div>
        <div class="detail-badges">
          <span id="matchCountBadge" class="badge">0경기</span>
          <span id="winRateBadge" class="badge highlight">승률 0%</span>
        </div>
      </div>

      <!-- 최근 경기 칩 -->
      <div class="recent-matches-box">
        <div class="box-label">최근 경기 결과</div>
        <div id="recentMatchesContainer" class="recent-chips"></div>
      </div>

      <!-- 📱 [모바일 최적화] 연속 및 역대 최다 기록 섹션 -->
      <div class="streak-section">
        <div class="streak-header">
          <span class="section-title">⚡ 현재 상대 전적 상태</span>
          <div id="streakBadge" class="streak-badge">계산 중...</div>
        </div>

        <!-- 🏆 2x2 대시보드 -->
        <div class="max-streak-container">
          <div class="max-streak-title">🏆 역대 상대 최고 기록 (Record)</div>
          <div class="max-streak-grid">
            <div class="max-card win">
              <span class="max-label">최다 연승</span>
              <span id="maxWinVal" class="max-val">0연승</span>
            </div>
            <div class="max-card lose">
              <span class="max-label">최다 연패</span>
              <span id="maxLoseVal" class="max-val">0연패</span>
            </div>
            <div class="max-card winless">
              <span class="max-label">최다 무승</span>
              <span id="maxWinlessVal" class="max-val">0경기</span>
            </div>
            <div class="max-card unbeaten">
              <span class="max-label">최다 무패</span>
              <span id="maxUnbeatenVal" class="max-val">0경기</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 선수 통계 요약 -->
      <div class="top-players-box">
        <div class="box-label">상대전 주요 선수</div>
        <div class="player-stat-item">
          ⚽ 최다 득점: <span id="topScorerName">-</span> <small id="topScorerDetail"></small>
        </div>
        <div class="player-stat-item">
          👟 최다 도움: <span id="topAssisterName">-</span> <small id="topAssisterDetail"></small>
        </div>
        <div class="player-stat-item">
          🧤 최다 선방: <span id="topDefenderName">-</span> <small id="topDefenderDetail"></small>
        </div>
        <div class="player-stat-item">
          📊 평균 득/실점: <span id="avgGoals">-</span> <small id="totalGoalsSub"></small>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
