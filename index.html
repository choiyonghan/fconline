<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC 온라인 상대 전적 조회</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- 헤더 영역 -->
    <header class="app-header">
      <h1>⚽ 상대 전적 분석기</h1>
      <p class="status-text" id="statusText">유저를 선택해주세요</p>
    </header>

    <!-- 1. 닉네임 선택 바 -->
    <div class="nickname-bar" id="nicknameBar"></div>

    <!-- 2. 날짜 및 필터 카드 -->
    <div class="filter-card">
      <div class="date-inputs">
        <input type="date" id="startDate">
        <span>~</span>
        <input type="date" id="endDate">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" id="btnSearch">조회</button>
        <button class="btn-secondary" id="btnReset">전체보기</button>
      </div>
    </div>

    <!-- 3. 상대 목록 및 상세 결과 영역 -->
    <main class="content-area">
      <div class="opponent-list" id="opponentList"></div>
    </main>

  </div>

  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await loadUsers();
      
      document.getElementById('btnSearch').addEventListener('click', fetchStats);
      document.getElementById('btnReset').addEventListener('click', () => {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        fetchStats();
      });
    });

    async function loadUsers() {
      const { data: users, error } = await supabaseClient.from('users').select('*');
      if (error || !users) return;

      const bar = document.getElementById('nicknameBar');
      bar.innerHTML = '';

      users.forEach((user, idx) => {
        const btn = document.createElement('button');
        btn.className = `btn-nickname ${idx === 0 ? 'active' : ''}`;
        btn.textContent = user.nickname;
        btn.onclick = () => selectUser(user, btn);
        bar.appendChild(btn);

        if (idx === 0) selectedUser = user;
      });

      if (selectedUser) fetchStats();
    }

    function selectUser(user, btnElement) {
      document.querySelectorAll('.btn-nickname').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');
      selectedUser = user;
      document.getElementById('statusText').textContent = `${user.nickname} 님의 상대 전적`;
      fetchStats();
    }

    async function fetchStats() {
      if (!selectedUser) return;

      // 1. 기존 match_details 데이터 가져오기 (승/무/패 및 상세 스코어 계산용)
      const { data: details, error: detailErr } = await supabaseClient
        .from('match_details')
        .select('*, matches(match_date)')
        .eq('ouid', selectedUser.ouid);

      // 2. user_opponent_streaks 데이터 가져오기 (최다/현재 연승연패 기록용)
      const { data: streaks, error: streakErr } = await supabaseClient
        .from('user_opponent_streaks')
        .select('*')
        .eq('ouid', selectedUser.ouid);

      if (detailErr) {
        console.error('데이터 조회 오류:', detailErr);
        return;
      }

      // streak 데이터를 Map 구조로 변환 (빠른 조회용)
      const streakMap = new Map();
      if (streaks) {
        streaks.forEach(s => streakMap.set(s.opponent_ouid, s));
      }

      // 매치 데이터를 상대별로 그룹화
      const groups = {};
      (details || []).forEach(d => {
        const opOuid = d.opponent_ouid || 'UNKNOWN';
        if (!groups[opOuid]) {
          groups[opOuid] = {
            opOuid: opOuid,
            opNick: d.opponent_nick || '상대 미상',
            wins: 0,
            draws: 0,
            losses: 0,
            totalMatches: 0,
            lastDate: d.matches ? d.matches.match_date : (d.match_date || d.created_at)
          };
        }

        groups[opOuid].totalMatches++;
        if (d.match_result === '승') groups[opOuid].wins++;
        else if (d.match_result === '패') groups[opOuid].losses++;
        else groups[opOuid].draws++;
      });

      renderOpponentCards(Object.values(groups), streakMap);
    }

    function renderOpponentCards(opponentList, streakMap) {
      const container = document.getElementById('opponentList');
      container.innerHTML = '';

      if (opponentList.length === 0) {
        container.innerHTML = '<p class="empty-msg">전적 데이터가 없습니다.</p>';
        return;
      }

      // 최신 경기순 정렬
      opponentList.sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));

      opponentList.forEach(op => {
        const streakInfo = streakMap.get(op.opOuid) || {};
        const winRate = op.totalMatches > 0 ? ((op.wins / op.totalMatches) * 100).toFixed(1) : 0;

        const card = document.createElement('div');
        card.className = 'op-card';

        // 💡 [기존 UI 100% 유지] + [하단 통산 최다 기록 미니 영역 추가]
        card.innerHTML = `
          <!-- 기존 헤더 (상대 닉네임 & 승률) -->
          <div class="op-card-header">
            <span class="op-name">vs ${op.opNick}</span>
            <span class="op-winrate">승률 ${winRate}%</span>
          </div>

          <!-- 기존 스코어 바 (승/무/패 & 총 경기수) -->
          <div class="op-score-bar">
            <div class="score-item win">${op.wins}승</div>
            <div class="score-item draw">${op.draws}무</div>
            <div class="score-item lose">${op.losses}패</div>
            <div class="score-total">(${op.totalMatches}전)</div>
          </div>

          <!-- ➕ 기존 UI 디자인에 방해받지 않는 [통산 최다 기록 뱃지 라인] -->
          <div class="op-streak-wrapper" style="margin-top: 12px; padding-top: 10px; border-top: 1px dashed #e2e8f0; font-size: 0.85rem; color: #475569;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
              <span>🔥 <b>최다 연승:</b> <span style="color: #2563eb; font-weight: bold;">${streakInfo.max_win_streak || 0}연승</span></span>
              <span>😭 <b>최다 연패:</b> <span style="color: #dc2626; font-weight: bold;">${streakInfo.max_lose_streak || 0}연패</span></span>
            </div>
            <div style="display: flex; justify-content: space-between;">
              <span>🛡️ <b>최다 무패:</b> ${streakInfo.max_unbeaten_streak || 0}경기</span>
              <span>⚠️ <b>최다 무승:</b> ${streakInfo.max_winless_streak || 0}경기</span>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
