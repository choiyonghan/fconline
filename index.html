<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FC Online 전적 분석 대시보드</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>FC Online 전적 분석</h1>
  
  <div class="nickname-container" id="nicknameButtons"></div>
  <div id="status">DB 및 선수 메타데이터를 불러오는 중입니다...</div>

  <!-- 깔끔해진 조회 영역 (width 100% 적용) -->
  <div class="summary-info" id="summaryInfo" style="display: none;">
    <div class="summary-card">
      <div class="date-range-header">
        <span class="date-label">📅 조회</span>
        <span id="dateRange" class="date-text">-</span>
      </div>
      
      <div class="date-filter-box">
        <div class="date-inputs-wrapper">
          <input type="date" id="startDate">
          <span class="date-separator">~</span>
          <input type="date" id="endDate">
        </div>
        <div class="date-buttons-wrapper">
          <button id="btnSearchDate" type="button" class="btn-date-search">조회</button>
          <button id="btnResetDate" type="button" class="btn-date-reset">전체</button>
        </div>
      </div>
    </div>
  </div>

  <div id="overallStatsContainer"></div>
  
  <!-- 모바일 카드 리스트 -->
  <div class="opponent-list" id="opponentList" style="display: none;"></div>

  <!-- 상세 분석 리포트 카드 -->
  <div class="detail-card" id="detailCard" style="display: none;">
    <div class="detail-header">
      <div class="detail-title" id="detailTitle">상대 분석 상세 리포트</div>
      <div class="streak-badge" id="streakBadge">-</div>
    </div>
    
    <!-- 요약 뱃지들 -->
    <div class="match-summary-badges">
      <span class="badge info-badge" id="matchCountBadge">총 -경기</span>
      <span class="badge info-badge" id="winRateBadge">승률 -%</span>
      <span class="click-hint">💡 다른 상대를 클릭하면 지표가 전환됩니다.</span>
    </div>

    <div class="dashboard-grid">
      <!-- 1. 평균 득점 및 실점 -->
      <div class="metric-box">
        <div class="metric-title">📊 경기당 평균 득/실점</div>
        <div class="metric-value" id="avgGoals">-</div>
        <div class="metric-sub" id="totalGoalsSub">총 -득점 / 총 -실점</div>
      </div>

      <!-- 2. 최다 득점 선수 -->
      <div class="metric-box">
        <span class="badge goal-badge">⚽ 최다 득점자</span>
        <div class="metric-value" id="topScorerName">-</div>
        <div class="metric-sub" id="topScorerDetail">-경기 -골 (평균 -골)</div>
      </div>

      <!-- 3. 최다 어시스트 선수 -->
      <div class="metric-box">
        <span class="badge assist-badge">🅰️ 최다 어시스트</span>
        <div class="metric-value" id="topAssisterName">-</div>
        <div class="metric-sub" id="topAssisterDetail">-경기 -도움 (평균 -도움)</div>
      </div>

      <!-- 4. 최다 선방 선수 -->
      <div class="metric-box">
        <span class="badge defense-badge">🧤 철벽 수문장 (최다 선방)</span>
        <div class="metric-value" id="topDefenderName">-</div>
        <div class="metric-sub" id="topDefenderDetail">-경기 -선방 (평균 -선방)</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
