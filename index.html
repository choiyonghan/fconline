<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC 온라인 상대 전적 분석기</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- 헤더 영역 -->
    <header class="app-header">
      <h1>⚽ 상대 전적 분석기</h1>
      <p class="status-text" id="statusText">유저를 선택해주세요</p>
    </header>

    <!-- 1. 닉네임 선택 바 -->
    <div class="nickname-bar" id="nicknameBar">
      <!-- JS로 동적 생성 -->
    </div>

    <!-- 2. 날짜 필터 카드 -->
    <div class="filter-card">
      <div class="date-inputs">
        <input type="date" id="startDate">
        <span>~</span>
        <input type="date" id="endDate">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" id="btnSearch">조회</button>
        <button class="btn-secondary" id="btnReset">전체보기</button>
      </div>
    </div>

    <!-- 3. 상대 전적 카드가 들어갈 영역 -->
    <main class="content-area">
      <div class="opponent-list" id="opponentList">
        <!-- JS로 동적 생성 -->
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
