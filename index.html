<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC Online 상대 닉네임별 전적 분석 (전역 캐시 적용)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1050px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f8fafc;
      color: #1e293b;
    }
    h1 { text-align: center; color: #0f172a; margin-bottom: 8px; }
    .update-time { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .nickname-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .btn-nickname {
      background-color: #2563eb; color: white; border: none; padding: 10px 18px;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
    }
    .btn-nickname:hover { background-color: #1d4ed8; }
    .btn-nickname.active { background-color: #0f172a; }
    #status { text-align: center; font-weight: 600; margin: 20px 0; color: #64748b; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); overflow-x: auto; display: none; }
    table { width: 100%; border-collapse: collapse; text-align: center; white-space: nowrap; }
    th, td { padding: 14px 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    th { background-color: #0f172a; color: white; font-weight: 600; }
    tr:hover { background-color: #f1f5f9; }
    tr.wook-row { background-color: #fffbeb; }
    .wook-badge { background-color: #d4af37; color: #111; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .opponent-cell { font-weight: bold; color: #0f172a; text-align: left; padding-left: 16px; }
    .win-text { color: #16a34a; font-weight: bold; }
    .lose-text { color: #dc2626; font-weight: bold; }
    .draw-text { color: #64748b; font-weight: bold; }
    .wook-score-box { font-size: 12px; line-height: 1.4; text-align: left; }
    .wook-winner { font-weight: bold; color: #b45309; }
  </style>
</head>
<body>

  <h1>FC Online 상대 닉네임별 전적 분석</h1>
  <div class="update-time" id="updateTime">데이터 로딩 중...</div>

  <div class="nickname-container" id="nicknameButtons"></div>
  <div id="status">닉네임을 선택해주세요.</div>

  <div class="table-container" id="tableContainer">
    <table>
      <thead>
        <tr>
          <th style="text-align: left; padding-left: 16px;">상대 닉네임</th>
          <th>판수</th>
          <th>기본 전적 (승/무/패)</th>
          <th>승률</th>
          <th>득/실</th>
          <th>평균 점유율</th>
          <th>유효/총 슈팅 (경기당)</th>
          <th>평균 패스 성공률</th>
          <th>🏆 욱식 점수 및 승패</th>
        </tr>
      </thead>
      <tbody id="resultTableBody"></tbody>
    </table>
  </div>

  <script>
    const NICKNAMES = ["내혀를가져가", "지린성에사는욱구", "욱냥0I", "서울쥐", "아기블루스", "ST반니스텔로이", "프란체스co토티"];
    const WOOK_NICKNAMES = ["지린성에사는욱구", "욱냥0I"];
    let cachedData = null;

    async function loadCacheData() {
      const statusEl = document.getElementById("status");
      const timeEl = document.getElementById("updateTime");
      try {
        // 캐시 파일 로드 (브라우저 캐시 방지 파라미터 추가)
        const response = await fetch(`./data.json?t=${new Date().getTime()}`);
        cachedData = await response.json();

        if (cachedData.updatedAt) {
          const date = new Date(cachedData.updatedAt);
          timeEl.innerText = `최종 데이터 업데이트: ${date.toLocaleString("ko-KR")}`;
        }
        statusEl.innerText = "버튼을 누르면 즉시 미리 집계된 전적을 확인합니다.";
        initButtons();
      } catch (e) {
        statusEl.innerText = "데이터 캐시 파일을 불러오는데 실패했습니다.";
        timeEl.innerText = "";
      }
    }

    function initButtons() {
      const container = document.getElementById("nicknameButtons");
      container.innerHTML = "";
      NICKNAMES.forEach(nickname => {
        const btn = document.createElement("button");
        btn.className = "btn-nickname";
        btn.innerText = nickname;
        btn.onclick = () => showUserStat(nickname, btn);
        container.appendChild(btn);
      });
    }

    function showUserStat(selectedNickname, btnElement) {
      document.querySelectorAll(".btn-nickname").forEach(b => b.classList.remove("active"));
      btnElement.classList.add("active");

      const opponentGroup = cachedData.users ? cachedData.users[selectedNickname] : null;

      if (!opponentGroup || Object.keys(opponentGroup).length === 0) {
        document.getElementById("status").innerText = `'${selectedNickname}' 님의 수집된 데이터가 없습니다.`;
        document.getElementById("tableContainer").style.display = "none";
        return;
      }

      renderGroupedTable(selectedNickname, opponentGroup);
      document.getElementById("status").innerText = `'${selectedNickname}' 님의 전적 분석 데이터입니다.`;
    }

    function renderGroupedTable(selectedNickname, opponentGroup) {
      const tableBody = document.getElementById("resultTableBody");
      tableBody.innerHTML = "";

      const isSelectedWook = WOOK_NICKNAMES.includes(selectedNickname);
      const sortedOpponents = Object.keys(opponentGroup).sort((a, b) => opponentGroup[b].total - opponentGroup[a].total);

      sortedOpponents.forEach(opName => {
        const stat = opponentGroup[opName];
        const winRate = stat.total > 0 ? ((stat.wins / stat.total) * 100).toFixed(1) : "0.0";
        const avgPossession = stat.total > 0 ? (stat.possessionSum / stat.total).toFixed(1) : "0";
        const avgEffectiveShoot = stat.total > 0 ? (stat.effectiveShootSum / stat.total).toFixed(1) : "0";
        const avgTotalShoot = stat.total > 0 ? (stat.shootTotalSum / stat.total).toFixed(1) : "0";
        const passSuccessRate = stat.passTrySum > 0 ? ((stat.passSuccessSum / stat.passTrySum) * 100).toFixed(1) : "0.0";

        const isOpponentWook = WOOK_NICKNAMES.includes(opName);
        const hasWookCalc = isSelectedWook || isOpponentWook;

        let wookHtml = "<span style='color:#94a3b8;'>-</span>";

        if (hasWookCalc) {
          let wookWins, wookDraws, wookLosses, opponentLabel;
          if (isSelectedWook) {
            wookWins = stat.wins; wookDraws = stat.draws; wookLosses = stat.losses; opponentLabel = opName;
          } else {
            wookWins = stat.losses; wookDraws = stat.draws; wookLosses = stat.wins; opponentLabel = selectedNickname;
          }

          const swScore = (wookWins * 5) + (wookDraws * 3) + (wookLosses * 1);
          const opScore = (wookLosses * 3) + (wookDraws * 1) + (wookWins * 0);

          let winnerText = "🤝 무승부";
          if (swScore > opScore) winnerText = isSelectedWook ? "🥇 승욱 승리!" : `🥇 승욱(${opName}) 승리!`;
          else if (swScore < opScore) winnerText = `🏅 ${opponentLabel} 승리!`;

          wookHtml = `
            <div class="wook-score-box">
              <b>승욱</b>: ${swScore}점 | <b>${opponentLabel}</b>: ${opScore}점<br>
              <span class="wook-winner">${winnerText}</span>
            </div>
          `;
        }

        const row = document.createElement("tr");
        if (hasWookCalc) row.className = "wook-row";

        row.innerHTML = `
          <td class="opponent-cell">${opName}${hasWookCalc ? '<span class="wook-badge">욱식</span>' : ''}</td>
          <td><strong>${stat.total}</strong></td>
          <td><span class="win-text">${stat.wins}승</span> <span class="draw-text">${stat.draws}무</span> <span class="lose-text">${stat.losses}패</span></td>
          <td>${winRate}%</td>
          <td>${stat.goalsFor}/${stat.goalsAgainst}</td>
          <td>${avgPossession}%</td>
          <td>${avgEffectiveShoot} / ${avgTotalShoot}개</td>
          <td>${passSuccessRate}%</td>
          <td>${wookHtml}</td>
        `;
        tableBody.appendChild(row);
      });

      document.getElementById("tableContainer").style.display = "block";
    }

    window.onload = loadCacheData;
  </script>
</body>
</html>
