<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC 온라인 상대 전적 조회</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- 헤더 영역 -->
    <header class="app-header">
      <h1>⚽ 상대 전적 분석기</h1>
      <p class="status-text" id="statusText">유저를 선택해주세요</p>
    </header>

    <!-- 1. 닉네임 선택 바 -->
    <div class="nickname-bar" id="nicknameBar">
      <!-- JS로 동적 생성됨 -->
    </div>

    <!-- 2. 날짜 및 필터 카드 -->
    <div class="filter-card">
      <div class="date-inputs">
        <input type="date" id="startDate">
        <span>~</span>
        <input type="date" id="endDate">
      </div>
      <div class="filter-actions">
        <button class="btn-primary" id="btnSearch">조회</button>
        <button class="btn-secondary" id="btnReset">전체보기</button>
      </div>
    </div>

    <!-- 3. 상대 목록 및 상세 결과 영역 -->
    <main class="content-area">
      <div class="opponent-list" id="opponentList">
        <!-- JS로 동적 생성됨 -->
      </div>
    </main>

  </div>

  <script>
    // Supabase 설정 (환경에 맞게 URL 및 Key 입력)
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedUser = null;
    let selectedOpponent = null;

    // 초기화
    document.addEventListener('DOMContentLoaded', async () => {
      await loadUsers();
      
      document.getElementById('btnSearch').addEventListener('click', fetchStats);
      document.getElementById('btnReset').addEventListener('click', () => {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        fetchStats();
      });
    });

    // 유저 목록 불러오기
    async function loadUsers() {
      const { data: users, error } = await supabaseClient.from('users').select('*');
      if (error || !users) return;

      const bar = document.getElementById('nicknameBar');
      bar.innerHTML = '';

      users.forEach((user, idx) => {
        const btn = document.createElement('button');
        btn.className = `btn-nickname ${idx === 0 ? 'active' : ''}`;
        btn.textContent = user.nickname;
        btn.onclick = () => selectUser(user, btn);
        bar.appendChild(btn);

        if (idx === 0) selectedUser = user;
      });

      if (selectedUser) fetchStats();
    }

    function selectUser(user, btnElement) {
      document.querySelectorAll('.btn-nickname').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');
      selectedUser = user;
      document.getElementById('statusText').textContent = `${user.nickname} 님의 상대 전적`;
      fetchStats();
    }

    // 전적 및 상대별 최다/현재 스트릭 데이터 조회
    async function fetchStats() {
      if (!selectedUser) return;

      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      // 1. user_opponent_streaks 테이블에서 요약 & 최다 기록 데이터 가져오기
      const { data: streakData, error: streakErr } = await supabaseClient
        .from('user_opponent_streaks')
        .select('*')
        .eq('ouid', selectedUser.ouid)
        .order('last_match_date', { ascending: false });

      if (streakErr) {
        console.error('Streaks 가져오기 실패:', streakErr);
        return;
      }

      renderOpponentList(streakData || []);
    }

    // 상대 리스트 및 최다 연승/연패 카드 렌더링
    function renderOpponentList(streaks) {
      const listContainer = document.getElementById('opponentList');
      listContainer.innerHTML = '';

      if (streaks.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; padding: 20px; color:#64748b;">전적 데이터가 없습니다.</p>';
        return;
      }

      streaks.forEach(item => {
        const card = document.createElement('div');
        card.className = 'op-card';

        // 기존 카드 구조에 [역대 최다 기록 2x2 대시보드] 추가
        card.innerHTML = `
          <div class="op-card-header">
            <span class="op-name">vs ${item.opponent_nick}</span>
            <span class="op-winrate">최근 경기: ${item.last_match_date ? item.last_match_date.slice(0, 10) : '-'}</span>
          </div>

          <!-- 🔥 현재 연속 상태 바 -->
          <div class="streak-section" style="margin: 6px 0;">
            <div class="streak-badge ${getStreakClass(item)}">
              🔥 현재: ${getCurrentStreakText(item)}
            </div>
          </div>

          <!-- 🏆 기존 UI 스타일을 유지한 역대 최다 기록 2x2 박스 -->
          <div class="max-streak-container">
            <div class="max-streak-title">🏆 통산 최다 기록</div>
            <div class="max-streak-grid">
              <div class="max-card win">
                <span class="max-label">최다 연승</span>
                <span class="max-val">${item.max_win_streak || 0}연승</span>
              </div>
              <div class="max-card lose">
                <span class="max-label">최다 연패</span>
                <span class="max-val">${item.max_lose_streak || 0}연패</span>
              </div>
              <div class="max-card winless">
                <span class="max-label">최다 무승(승없음)</span>
                <span class="max-val">${item.max_winless_streak || 0}경기</span>
              </div>
              <div class="max-card unbeaten">
                <span class="max-label">최다 무패(패없음)</span>
                <span class="max-val">${item.max_unbeaten_streak || 0}경기</span>
              </div>
            </div>
          </div>
        `;

        listContainer.appendChild(card);
      });
    }

    // 현재 스트릭 텍스트 추출
    function getCurrentStreakText(item) {
      if (item.current_win_streak > 0) return `${item.current_win_streak}연승 중 🚀`;
      if (item.current_lose_streak > 0) return `${item.current_lose_streak}연패 중 😭`;
      if (item.current_unbeaten_streak > 0) return `${item.current_unbeaten_streak}경기 무패 중 🛡️`;
      return '기록 없음';
    }

    // 현재 스트릭 배지 색상 클래스
    function getStreakClass(item) {
      if (item.current_win_streak > 0) return 'good';
      if (item.current_lose_streak > 0) return 'bad';
      if (item.current_unbeaten_streak > 0) return 'warning';
      return 'neutral';
    }
  </script>
</body>
</html>
